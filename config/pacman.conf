# /etc/pacman.conf — Arch Linux ARM (aarch64) for VMware on Mac M1
# 本設定檔用於 VMware VM 與 Docker 容器內的 pacman 套件管理

[options]
HoldPkg       = pacman glibc
Architecture  = aarch64

# 驗證套件簽章（建議保持 Required）
SigLevel      = Required DatabaseOptional
LocalFileSigLevel = Optional

# 平行下載（加快套件下載速度）
ParallelDownloads = 5

# 彩色輸出
Color

# 進度條
ILoveCandy

# 檢查磁碟空間後再安裝
CheckSpace

# --------------------------------------------------------------------------
# 官方倉庫（Arch Linux ARM aarch64）
# --------------------------------------------------------------------------
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[community]
Include = /etc/pacman.d/mirrorlist

[alarm]
Include = /etc/pacman.d/mirrorlist

[aur]
Include = /etc/pacman.d/mirrorlist
